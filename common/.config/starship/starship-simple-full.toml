RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style): "

[cmd_duration]
show_milliseconds = false
format = "[$duration]($style) "
style = "bold magenta"
disabled = false

[character]
disabled = false
success_symbol = '[|>](bold fg:#78E892)'
error_symbol = '[|>](bold fg:#eb6f92)'
vimcmd_symbol = '[<|](bold fg:#78E892)'
vimcmd_replace_one_symbol = '[<|](bold fg:lavender)'
vimcmd_replace_symbol = '[<|](bold fg:lavender)'
vimcmd_visual_symbol = '[<|](bold fg:yellow)'

[directory]
style = 'fg:bright-black'
format = "[$path]($style)"
truncation_length = 5
