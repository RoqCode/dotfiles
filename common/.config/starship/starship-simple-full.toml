"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$os\
$directory\
$line_break\
$character
"""

right_format = ""

[os]
disabled = false
style = "fg:bright-black"
format = "[$symbol ]($style)"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
